<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>GORILLATOOL - VR Edition</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    .info {
      position: absolute; top: 10px; left: 10px; color: #0ff; 
      background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px;
      font-family: monospace; z-index: 100; pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="info">
    <strong>GORILLATOOL VR</strong><br>
    Détection casque en cours...
  </div>

  <a-scene background="color: #0a001f" loading-screen="enabled: false">

    <!-- Lumière ambiance -->
    <a-entity light="type: ambient; color: #112; intensity: 0.6"></a-entity>
    <a-entity light="type: directional; color: #88f; intensity: 0.8" position="5 10 -5"></a-entity>

    <!-- Gros ASCII GORILLA flottant (texte 3D) -->
    <a-entity position="0 2.5 -6" rotation="0 15 0" text="value:     _____ ____ _____ _____ _ _ _______ ____ ____ _\n   / ____|/ __ \| __ \|_ _| | | | /\|__ __/ __ \ / __ \| |\n  | | __| | | | |__) | | | | | | | / \ | | | | | | | | | |\n  | | |_ | | | | _ / | | | | | | / /\ \ | | | | | | | | | |\n  | |__| | |__| | | \ \ _| |_| |____| |____ / ____ \| | | |__| | |__| | |____\n   \_____|\____/|_| \_\_____|______|______/_/ \_\_| \____/ \____/|______|; 
      color: #ff00ff; width: 6; align: center; font: https://cdn.aframe.io/fonts/Exo2Bold.fnt">
    </a-entity>

    <!-- Panneau de menu 3D -->
    <a-entity id="menu" position="0 1.2 -3.5" rotation="0 0 0">

      <a-plane width="3.2" height="2.8" color="#1a0033" opacity="0.95" shadow="cast:true; receive:true"></a-plane>

      <a-text value="GORILLATOOL MENU" position="0 1.1 0.05" color="#ff00ff" align="center" width="2.8" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-text id="status" value="Détection casque..." position="0 0.7 0.05" color="#00ffcc" align="center" width="2.6"></a-text>

      <!-- Toggles -->
      <a-entity id="aimbot" class="toggle" position="-1.2 0.2 0.1" data-name="Aimbot">
        <a-plane width="2" height="0.4" color="#222"></a-plane>
        <a-text value="Aimbot" position="-0.8 0 0.05" color="white" width="1.8"></a-text>
        <a-text id="aimbot-status" value="OFF" position="0.8 0 0.05" color="#ff0000" align="right" width="1"></a-text>
      </a-entity>

      <a-entity id="esp" class="toggle" position="-1.2 -0.3 0.1" data-name="ESP">
        <a-plane width="2" height="0.4" color="#222"></a-plane>
        <a-text value="ESP" position="-0.8 0 0.05" color="white" width="1.8"></a-text>
        <a-text id="esp-status" value="OFF" position="0.8 0 0.05" color="#ff0000" align="right" width="1"></a-text>
      </a-entity>

      <a-entity id="norecoil" class="toggle" position="-1.2 -0.8 0.1" data-name="No Recoil">
        <a-plane width="2" height="0.4" color="#222"></a-plane>
        <a-text value="No Recoil" position="-0.8 0 0.05" color="white" width="1.8"></a-text>
        <a-text id="norecoil-status" value="OFF" position="0.8 0 0.05" color="#ff0000" align="right" width="1"></a-text>
      </a-entity>

      <a-entity id="ammo" class="toggle" position="-1.2 -1.3 0.1" data-name="Unlimited Ammo">
        <a-plane width="2" height="0.4" color="#222"></a-plane>
        <a-text value="Unlimited Ammo" position="-0.8 0 0.05" color="white" width="1.8"></a-text>
        <a-text id="ammo-status" value="OFF" position="0.8 0 0.05" color="#ff0000" align="right" width="1"></a-text>
      </a-entity>

      <!-- Bouton Exit -->
      <a-plane id="exit-btn" width="2" height="0.45" color="#990000" position="0 -2 0.1" 
               onclick="exitVR()">
        <a-text value="EXIT" align="center" color="#fff" width="1.6" position="0 0 0.05"></a-text>
      </a-plane>

    </a-entity>

    <!-- Sol / Grid -->
    <a-plane position="0 0 -4" rotation="-90 0 0" width="20" height="20" color="#110022" 
             material="shader: flat"></a-plane>

  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    let connected = false;
    const cheats = {
      Aimbot: false,
      ESP: false,
      "No Recoil": false,
      "Unlimited Ammo": false
    };

    // Détection du casque + entrée automatique en VR/MR
    async function detectAndEnterVR() {
      if (!navigator.xr) {
        document.querySelector('.info').innerHTML += "<br>WebXR non supporté";
        return;
      }

      const isVR = await navigator.xr.isSessionSupported('immersive-vr');
      const isAR = await navigator.xr.isSessionSupported('immersive-ar'); // Passthrough sur Quest 3/3S

      let mode = 'immersive-vr';
      if (isAR) mode = 'immersive-ar';   // Priorité au passthrough si disponible

      document.getElementById('status').setAttribute('value', 
        isAR ? 'Meta Quest détecté (Passthrough)' : 'Meta Quest détecté (VR)');

      try {
        const session = await navigator.xr.requestSession(mode, {
          optionalFeatures: ['local-floor', 'hand-tracking']
        });
        scene.xrSession = session;
        connected = true;
        console.log("GORILLATOOL connecté au casque !");
      } catch (e) {
        console.log("Impossible d'entrer en VR automatiquement");
      }
    }

    // Toggle des cheats (cliquable avec contrôleurs ou mains)
    function setupToggles() {
      document.querySelectorAll('.toggle').forEach(el => {
        const name = el.getAttribute('data-name');
        el.addEventListener('click', () => {
          cheats[name] = !cheats[name];
          const statusEl = document.getElementById(name.toLowerCase().replace(/\s+/g, '') + '-status');
          if (statusEl) {
            statusEl.setAttribute('value', cheats[name] ? 'ON' : 'OFF');
            statusEl.setAttribute('color', cheats[name] ? '#00ff00' : '#ff0000');
          }
          console.log(`${name} → ${cheats[name] ? 'ON' : 'OFF'}`);
        });
      });
    }

    function exitVR() {
      if (scene.xrSession) {
        scene.xrSession.end();
      }
      window.location.reload();
    }

    // Initialisation
    window.addEventListener('load', () => {
      setupToggles();
      detectAndEnterVR();

      // Message de bienvenue
      setTimeout(() => {
        if (connected) {
          document.querySelector('.info').innerHTML = `<strong>GORILLATOOL VR</strong><br>Connecté avec succès !`;
        }
      }, 2000);
    });
  </script>
</body>
</html>
