<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>GORILLATOOL - VR Controller</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    .overlay {
      position: absolute; top: 15px; left: 15px; color: #0ff; 
      background: rgba(10,0,30,0.9); padding: 15px; border-radius: 10px;
      z-index: 200; font-family: monospace; border: 1px solid #0ff;
    }
  </style>
</head>
<body>
  <div id="overlay" class="overlay">
    <strong>GORILLATOOL</strong><br>
    Appuie sur ENTER VR pour utiliser les manettes
  </div>

  <a-scene background="color: #0a001f" xr-mode-ui="enabled: false">

    <!-- Lumières néon -->
    <a-entity light="type: ambient; color: #220033; intensity: 0.8"></a-entity>
    <a-entity light="type: point; color: #ff00ff; intensity: 1.5" position="0 5 -5"></a-entity>

    <!-- Menu principal -->
    <a-entity id="menu" position="0 1.6 -4">

      <a-plane width="4" height="3" color="#1a0033" opacity="0.95" shadow></a-plane>
      
      <a-text value="GORILLATOOL" position="0 1.1 0.1" color="#ff00ff" align="center" width="3.5" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-text value="Utilise les manettes pour activer les options" position="0 0.6 0.1" color="#00ffcc" align="center" width="3"></a-text>

      <!-- Options -->
      <a-entity class="option" id="aimbot" position="0 0.1 0.1" data-state="off">
        <a-plane width="3.5" height="0.5" color="#220044"></a-plane>
        <a-text value="Aimbot" position="-1.3 0 0.05" color="white" width="2.2"></a-text>
        <a-text id="aimbot-status" value="OFF" position="1.4 0 0.05" color="#ff4444" align="right" width="1"></a-text>
      </a-entity>

      <a-entity class="option" id="esp" position="0 -0.5 0.1" data-state="off">
        <a-plane width="3.5" height="0.5" color="#220044"></a-plane>
        <a-text value="ESP" position="-1.3 0 0.05" color="white" width="2.2"></a-text>
        <a-text id="esp-status" value="OFF" position="1.4 0 0.05" color="#ff4444" align="right" width="1"></a-text>
      </a-entity>

      <a-entity class="option" id="norecoil" position="0 -1.1 0.1" data-state="off">
        <a-plane width="3.5" height="0.5" color="#220044"></a-plane>
        <a-text value="No Recoil" position="-1.3 0 0.05" color="white" width="2.2"></a-text>
        <a-text id="norecoil-status" value="OFF" position="1.4 0 0.05" color="#ff4444" align="right" width="1"></a-text>
      </a-entity>

      <a-entity class="option" id="ammo" position="0 -1.7 0.1" data-state="off">
        <a-plane width="3.5" height="0.5" color="#220044"></a-plane>
        <a-text value="Unlimited Ammo" position="-1.3 0 0.05" color="white" width="2.2"></a-text>
        <a-text id="ammo-status" value="OFF" position="1.4 0 0.05" color="#ff4444" align="right" width="1"></a-text>
      </a-entity>

      <!-- Bouton ENTER VR (bas à droite) -->
      <a-entity id="enter-vr" position="1.6 -2.2 0.1">
        <a-plane width="2" height="0.7" color="#0066ff"></a-plane>
        <a-text value="ENTER VR MODE" position="0 0 0.05" color="white" align="center" width="1.8"></a-text>
      </a-entity>

    </a-entity>

    <!-- Contrôleurs (pour les gâchettes) -->
    <a-entity id="right-hand" meta-touch-controls="hand: right" raycaster="objects: .option, #enter-vr" line="color: #ff00ff; opacity: 0.8"></a-entity>
    <a-entity id="left-hand"  meta-touch-controls="hand: left"  raycaster="objects: .option, #enter-vr" line="color: #00ffff; opacity: 0.8"></a-entity>

  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const cheats = {
      "Aimbot": false,
      "ESP": false,
      "No Recoil": false,
      "Unlimited Ammo": false
    };

    function toggleCheat(cheatName) {
      cheats[cheatName] = !cheats[cheatName];
      const statusEl = document.getElementById(cheatName.toLowerCase().replace(/\s+/g, '') + '-status');
      if (statusEl) {
        statusEl.setAttribute('value', cheats[cheatName] ? 'ON' : 'OFF');
        statusEl.setAttribute('color', cheats[cheatName] ? '#00ff88' : '#ff4444');
      }
    }

    // Interaction avec les gâchettes des manettes
    function setupControllers() {
      const options = document.querySelectorAll('.option, #enter-vr');

      options.forEach(opt => {
        opt.addEventListener('triggerdown', () => {   // <- événement le plus fiable pour la gâchette
          if (opt.id === 'enter-vr') {
            scene.enterVR({ mode: 'immersive-ar' }).catch(() => {
              scene.enterVR({ mode: 'immersive-vr' });
            });
            return;
          }

          const name = opt.querySelector('a-text').getAttribute('value');
          if (cheats.hasOwnProperty(name)) {
            toggleCheat(name);
            
            // Feedback visuel
            opt.setAttribute('scale', '1.1 1.1 1.1');
            setTimeout(() => opt.setAttribute('scale', '1 1 1'), 200);
          }
        });
      });
    }

    window.addEventListener('load', () => {
      setupControllers();

      // Message de bienvenue
      setTimeout(() => {
        document.getElementById('overlay').innerHTML = `<strong>GORILLATOOL</strong><br>Prêt - Clique sur ENTER VR MODE`;
      }, 1000);
    });
  </script>
</body>
</html>
