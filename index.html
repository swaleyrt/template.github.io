<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Scène VR / MR - Quest</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  
  <style>
    body { margin: 0; padding: 0; background: #111; font-family: Arial, sans-serif; }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 8px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="info">
    <h2>Test WebXR pour Meta Quest</h2>
    <p>Ouvre cette page dans le navigateur du Quest</p>
  </div>

  <a-scene background="color: #000000" xr-mode-ui="enabled: true">

    <!-- Objets 3D -->
    <a-box position="0 1 -3" rotation="0 45 0" color="#00ffff" shadow="cast: true"></a-box>
    <a-sphere position="2 1.5 -4" radius="0.8" color="#ff00aa" shadow="cast: true"></a-sphere>
    <a-cylinder position="-2 1 -3" radius="0.6" height="2" color="#ffcc00" shadow="cast: true"></a-cylinder>

    <!-- Sol (visible en VR et MR) -->
    <a-plane position="0 0 -4" rotation="-90 0 0" width="12" height="12" color="#222222" shadow="receive: true"></a-plane>

    <!-- Boutons de démarrage -->
    <a-entity position="0 1.6 -2.5">

      <!-- Bouton VR -->
      <a-plane id="btn-vr" width="2" height="0.5" color="#0066ff" position="0 0.6 0" 
               onclick="document.querySelector('a-scene').enterVR({mode: 'immersive-vr'})">
        <a-text value="Entrer en VR Immersive" align="center" color="white" width="1.8"></a-text>
      </a-plane>

      <!-- Bouton Mixed Reality (Passthrough) -->
      <a-plane id="btn-mr" width="2" height="0.5" color="#00cc66" position="0 0 0" 
               onclick="document.querySelector('a-scene').enterVR({mode: 'immersive-ar'})">
        <a-text value="Entrer en Mixed Reality (Passthrough)" align="center" color="white" width="1.8"></a-text>
      </a-plane>

    </a-entity>

  </a-scene>

  <script>
    // Petite aide : force l'affichage des boutons si besoin
    window.addEventListener('load', () => {
      console.log("Scène A-Frame chargée - Prêt pour WebXR sur Quest");
    });
  </script>
</body>
</html>
